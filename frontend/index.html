<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#1a1a2e"/>
  <title>BlockVision Edu 🐱</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     EKRAN 1 — ANA MENÜ
══════════════════════════════════════════════════════════════ -->
<div id="screen-menu" class="screen">
  <div class="menu-bg">
    <div class="menu-stars" id="menu-stars"></div>
  </div>

  <div class="menu-content">
    <div class="menu-logo">
      <div class="logo-cat">🐱</div>
      <h1 class="logo-title">BlockVision<br><span>Edu</span></h1>
      <p class="logo-sub">Blokları fotoğrafla, kediyi yönet!</p>
    </div>

    <button class="btn-menu-play" id="btn-play">
      ▶ &nbsp; Oynamaya Başla
    </button>

    <div id="stage-select-section" style="display:none">
      <h2 class="section-title">Stage Seç</h2>
      <div class="stage-grid" id="stage-grid"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     EKRAN 2 — STAGE OYUN ALANI
══════════════════════════════════════════════════════════════ -->
<div id="screen-stage" class="screen" style="display:none">

  <!-- Üst bar -->
  <header class="stage-header">
    <button class="btn-icon" id="back-btn" aria-label="Geri">◀</button>
    <div class="stage-header-info">
      <div id="stage-info" class="stage-title-text">Stage 1</div>
      <div id="stage-desc" class="stage-desc-text"></div>
    </div>
    <div class="header-status">
      <span class="status-dot dot-idle" id="status-dot"></span>
      <span id="status-text">Hazır</span>
    </div>
  </header>

  <!-- Ana içerik -->
  <div class="stage-body">

    <!-- Sol panel: Fotoğraf yükleme -->
    <aside class="panel panel-upload">
      <div class="drop-zone" id="drop-zone" tabindex="0" role="button"
           aria-label="Fotoğraf yükle">
        <input type="file" id="file-input" accept="image/*" capture="environment" hidden/>
        <div class="drop-inner" id="drop-inner">
          <div class="drop-icon">📷</div>
          <p class="drop-text">Fotoğraf çek<br>veya yükle</p>
        </div>
        <img id="preview-img" class="preview-img" style="display:none" alt=""/>
      </div>

      <!-- Taranıyor overlay -->
      <div class="analyzing-overlay" id="analyzing-overlay" style="display:none">
        <div class="analyzing-spinner"></div>
        <div class="analyzing-text">Bloklar taranıyor...</div>
      </div>

      <!-- Tespit edilen sequence -->
      <div class="chips-box" id="chips-box" style="display:none">
        <div class="chips-label">Tespit Edildi</div>
        <div class="chips-wrap" id="chips-wrap"></div>
      </div>

      <!-- İpucu -->
      <div class="stage-hint" id="stage-hint" style="display:none"></div>
      <button class="btn-hint" id="hint-btn">💡 İpucu</button>
    </aside>

    <!-- Orta: Harita -->
    <main class="panel panel-stage">
      <div class="stage-wrapper" id="stage-wrapper">
        <div id="stage"></div>
      </div>
      <div class="stage-controls">
        <button class="btn-run" id="run-btn" disabled>▶ Çalıştır</button>
        <button class="btn-reset" id="reset-btn">↺ Sıfırla</button>
        <span class="step-counter" id="step-counter">Adım 0 / 0</span>
      </div>
    </main>

    <!-- Sağ panel: Program listesi -->
    <aside class="panel panel-program">
      <div class="panel-title">📋 Program</div>
      <ol class="program-list" id="program-list">
        <li class="prog-empty">Henüz program yok.</li>
      </ol>
    </aside>

  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     EKRAN 3 — KAZANMA
══════════════════════════════════════════════════════════════ -->
<div id="screen-win" class="screen" style="display:none">
  <canvas id="confetti-canvas" class="confetti-canvas"></canvas>
  <div class="win-content">
    <div class="win-cat">🐱</div>
    <h1 class="win-title" id="win-title">Tebrikler!</h1>
    <p class="win-sub" id="win-sub"></p>
    <div class="win-stars">⭐⭐⭐</div>
    <div class="win-btns">
      <button class="btn-win-primary" id="win-next-btn">Sonraki Stage ▶</button>
      <button class="btn-win-secondary" id="win-retry-btn">↺ Tekrar</button>
      <button class="btn-win-ghost" id="win-menu-btn">🏠 Menü</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="alert"></div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/stage.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
